<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rippa</title>
  <style>
    /* Reset y base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 400px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0b0c15;
      color: #ffffff;
      margin: 0;
      padding: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    /* Importar fuente Inter (si no está disponible, usa fallback) */
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

    .popup-container {
      position: relative;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1b2e 100%);
      padding: 20px;
    }

    /* Cabecera con gradiente y logo */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #c7b9ff, #a58aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .badge {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 500;
      color: #aaaaff;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Estado de conexión */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(20, 20, 35, 0.7);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: 18px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 8px 16px -8px rgba(0, 0, 0, 0.5);
    }
    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff4d4d;
      box-shadow: 0 0 10px #ff4d4d80;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.online {
      background: #4caf50;
      box-shadow: 0 0 12px #4caf50cc;
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0ff;
      flex: 1;
    }

    /* Contenedor de anime (tarjeta con imagen de fondo) */
    .anime-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #11121f;
      box-shadow: 0 12px 24px -8px #00000080;
      transition: transform 0.2s ease;
    }
    .anime-card:hover {
      transform: scale(1.01);
    }

    .anime-backdrop {
      position: relative;
      width: 100%;
      height: 180px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .anime-backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, #0f0f1a 0%, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
    }

    .anime-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 18px 18px;
      background: linear-gradient(to top, #0b0c15, rgba(11, 12, 21, 0.7), transparent);
      backdrop-filter: blur(2px);
    }

    .anime-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .anime-episode {
      font-size: 14px;
      font-weight: 500;
      color: #c0b0ff;
      margin-bottom: 8px;
      display: inline-block;
      background: rgba(160, 140, 255, 0.15);
      padding: 3px 12px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(160, 140, 255, 0.3);
    }

    .anime-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .genre-tag {
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(2px);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 500;
      color: #d0c0ff;
      border: 1px solid rgba(160, 140, 255, 0.3);
      letter-spacing: 0.3px;
      text-transform: lowercase;
    }
    .genre-tag::first-letter {
      text-transform: uppercase;
    }

    /* Estado vacío (diseño armonioso) */
    .empty-state {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 32px 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.03);
      margin-bottom: 20px;
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #a0a0ff;
      margin-bottom: 6px;
    }
    .empty-desc {
      font-size: 13px;
      color: #8080aa;
    }

    /* Botones */
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 5px;
    }
    .btn {
      flex: 1;
      background: rgba(30, 30, 50, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(160, 140, 255, 0.2);
      color: white;
      padding: 12px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 6px 12px -6px #00000080;
    }
    .btn:hover {
      background: rgba(60, 50, 100, 0.9);
      border-color: #8f7cff;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -8px #5a4abc;
    }
    .btn-primary {
      background: linear-gradient(145deg, #6a5acd, #5a4abc);
      border: 1px solid #8f7cff;
    }
    .btn-primary:hover {
      background: linear-gradient(145deg, #7b6cdf, #6b5bcd);
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      font-size: 11px;
      text-align: center;
      color: #4a4a6a;
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 15px;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>Rippa</h1>
      <span class="badge">v1.0</span>
    </div>

    <div class="status" id="status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Verificando...</span>
    </div>

    <div id="anime-container"></div>

    <div class="buttons">
      <a href="https://ko-fi.com/O5O590P5L" target="_blank" class="btn">
        <span>❤️</span> Donar
      </a>
      <a href="https://github.com/Vicemi/Rippa" target="_blank" class="btn btn-primary">
        <span>📥</span> Descargar
      </a>
    </div>

    <div class="footer">
      Hecho por Vicemi.dev
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
